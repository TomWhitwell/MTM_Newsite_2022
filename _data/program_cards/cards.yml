        source: code
      audio_out_r:
        label: |-
          Audio
          2
        description: Drive pulse outs from current audio polarity
        source: code
      cv_out_1:
        label: Algorithm
        description: Output of the noise algorithm and its current parameters. Both
          outs have the same source. I may consider making CV Out 2 go through a rainbow
          of noise instead.
        source: readme
      cv_out_2:
        label: Algorithm
        description: Output of the noise algorithm and its current parameters. Both
          outs have the same source. I may consider making CV Out 2 go through a rainbow
          of noise instead.
        source: readme

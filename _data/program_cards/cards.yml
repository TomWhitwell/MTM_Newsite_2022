          low audio rate.
        source: curated
      x:
        label: Cross Mod
        description: sets the intensity of cross-modulation between the LFOs.
        source: curated
      y:
        label: Crossfade
        description: crossfades each output with the inverted neighbouring LFO.
        source: curated

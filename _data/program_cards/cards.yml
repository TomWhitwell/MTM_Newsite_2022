    creator: Tom Whitwell
    language: C++ (ComputerCard)
    version: 1.5.3
    status: Working but Simple
    editor_url: https://www.musicthing.co.uk/web_config/turing.html
- id: 04_BYO_Benjolin
  title: Byo Benjolin
  release: 04 / 1.0
  summary: Rungler, Chaotic VCO, Noise Source, Turing Machine, Quantizer
  description: Rungler, Chaotic VCO, Noise Source, Turing Machine, Quantizer
  panel:
    inputs:
      audio_l:
        label: |-
          Audio
          1
        description: 'Used in main.cpp: data = AudioIn1() + 2048; // Convert to 0-4095'
        source: code
      audio_r:
        label: |-
          Audio
          2
        description: If AudioIn2 is connected, use it to control the Turing Probability
        source: code
      cv_1:
        label: |-
          CV
          1
        description: 'Used in main.cpp: offset = CVIn1() * (KnobVal(Knob::X) - 2048)
          >> 12;'
        source: code
      cv_2:
        label: |-
          CV
          2
        description: 'Used in main.cpp: vca = CVIn2() * KnobVal(Knob::Y) >> 12;'
        source: code
    outputs:
      audio_out_l:
        label: |-
          Audio
          1
        description: Output rungler signal
        source: code
      audio_out_r:
        label: |-
          Audio
          2
        description: Output rungler signal
        source: code
      pulse_out_1:
        label: |-
          Pulse
          1
        description: Output pulse signals based on the bottom bit of each channel
        source: code
      pulse_out_2:
        label: |-
          Pulse
          2
        description: Output pulse signals based on the bottom bit of each channel
        source: code
  switch_modes:
    up: ''
    middle: ''
    down: ''
  leds:
  - Now we have a shift register full of bits, let's process them for output Each
    output creates a 6 bit signal out of 3 2-bit cells (left and right on the LED
    screen)

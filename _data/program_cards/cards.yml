        label: End Pulse
        description: End-of-cycle trigger (fires when the sequence wraps from last
          step back to first)
        source: readme
  switch_modes:
    up: The sequencer runs, cycling through the active steps. LEDs show the current
      playback step. Main controls the internal clock tempo (overridden when an external
      clock is patched to Pulse In 1). X sets how many steps are active (1–8). The
      change takes effect immediately. Length 1 hammers a single step (useful for
      one-shot voices) — the end-of-cycle trigger fires every tick in that case. Y
      transposes VCO 2's pitch relati
    middle: Playback continues uninterrupted. The LEDs switch to showing the edit

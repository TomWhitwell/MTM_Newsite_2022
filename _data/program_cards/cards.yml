        description: VCA input for Audio Out 1. If unpatched, Audio Out 1 outputs
          its LFO directly.
        source: curated
      audio_r:
        label: |-
          VCA
          2
        description: VCA input for Audio Out 2. If unpatched, Audio Out 2 outputs
          its LFO directly.
        source: curated
      cv_1:
        label: |-

- id: 86_tesserae
  title: Tesserae — Arpeggiated Harmonic Generator
  release: 86 / 1.0
  summary: Tesserae — Variable-voice (2-8) arpeggiated chord generator with 5 patterns,
    10 scales, tap tempo, CV/audio transpose inputs, and dual CV + audio pitch outputs.
    Inspired by Laurie Spiegel...
  description: Tesserae — Variable-voice (2-8) arpeggiated chord generator with 5
    patterns, 10 scales, tap tempo, CV/audio transpose inputs, and dual CV + audio
    pitch outputs. Inspired by Laurie Spiegel's Music Mouse and Patchwork.
  panel:
    controls:
      main:
        label: |-
          Function depends
          on
        description: Function depends on Z switch position (see below)
        source: readme
      x:
        label: |-
          Melody position
          —
        description: Melody position — selects base note in the current scale across
          3 octaves
        source: readme
      y:
        label: |-
          Chord spacing
          —
        description: Chord spacing — how many scale degrees apart each voice is (1–5).
          Also sets voice count when Z Down held (2–8).
        source: readme
      z:
        label: |-
          Position |
          Mode
        description: 'Position | Mode | Knob Main | Knob Y Up | Pattern select | Choose
          arpeggio pattern (5 patterns) | — Centre | Root octave | Select root note
          (C1–C7, logarithmic) | — Down (tap < 300ms) | Tap tempo | — | — Down (hold
          >= 300ms) | Scale & voice select | Choose scale (10 scales) | Choose voice
          count (2–8) Pattern select (Z Up): Knob Main sweeps through 5 arp patterns.
          The selected pattern persists when the switch returns'
        source: readme
    inputs:
      audio_l:
        label: Pitch
        description: Adds a semitone offset to the arpeggiated voice outputs (CV Out
          1, Audio Out 1, Audio Out 2). Uses 1V/oct scaling (≈341 counts per octave,
          ≈28 counts per semitone). Does not affect the root note (CV Out 2). Ideal
          for vibrato, envelope-driven transposition, or sequenced pitch shifts from
          an external LFO or EG.
        source: readme
      audio_r:
        label: Pitch
        description: Adds a semitone offset to the root note, which shifts the entire
          harmonic framework — both the root (CV Out 2) and all derived chord notes.
          Same 1V/oct scaling. Use for key changes or root modulation from external
          CV.
        source: readme
      cv_1:
        label: |-
          Offsets melody
          position
        description: Offsets melody position (Knob X) when connected
        source: readme
      cv_2:
        label: |-
          Offsets chord
          spacing
        description: Offsets chord spacing (Knob Y) when connected
        source: readme
      pulse_1:
        label: Clock
        description: External clock — each rising edge advances one arpeggio step
          (overrides internal clock when connected)
        source: readme
      pulse_2:
        label: Reset
        description: Reset — restarts arpeggio from step 0
        source: readme
    outputs:
      audio_out_l:
        label: Pitch
        description: Same as CV Out 1 — current arpeggiated note, approximate 1V/oct
          (uncalibrated audio DAC)
        source: readme
      audio_out_r:
        label: Pitch
        description: Previous arpeggiated note (the note before the current step),
          approximate 1V/oct
        source: readme
      cv_out_1:
        label: Pitch
        description: Current arpeggiated chord note, calibrated 1V/oct
        source: readme
      cv_out_2:
        label: Pitch
        description: Root note (base melody pitch), always present, calibrated 1V/oct
        source: readme
      pulse_out_1:
        label: Gate
        description: Gate — high while the current arpeggio note is active (~50ms)
        source: readme
      pulse_out_2:
        label: Trigger
        description: Trigger — short pulse (~10ms) at the start of each arpeggio step
        source: readme
  switch_modes:
    up: Pattern select Choose arpeggio pattern (5 patterns) —
    middle: ''
    down: ''
  leds:
  - LED | Function | |-----|----------| | LEDs 0–3 | Shows current voice index modulo
    4 (one LED on at a time) | | LED 4 | On when scale/voice select mode is active
    (Z Switch Down held) | | LED 5 | On when external clock is connected (Pulse In
    1)
  notes:
  - Generated from README plus raw source usage scan. Labels marked by code only should
    be reviewed for musical wording.

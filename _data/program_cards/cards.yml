- id: 39_knots
  title: Knots
  release: 39 / 0.2
  summary: Six-engine oscillator firmware for the Music Thing Workshop System
  description: Six-engine oscillator firmware for the Music Thing Workshop System
  panel:
    controls:
      main:
        label: Pitch
        description: Used for tuning the main oscillator of all the engines. It's
          a 10 octave span from 10Hz to 10KHz, clamped at either end so CV or MIDI
          input won't push it past those minimum and maximum values.
        source: readme
      x:
        label: Mode / Next
        description: The X and Y trimmers adjust 2 parameters exposed by the engines.
          These differ per engine and, in some cases, are different in Alt mode. The
          parameters are musical to encourage their use. The X trimmer has an additional
          function used in conjunction with the Z switch.
        source: readme
      y:
        label: Mode / Next
        description: The X and Y trimmers adjust 2 parameters exposed by the engines.
          These differ per engine and, in some cases, are different in Alt mode. The
          parameters are musical to encourage their use. The X trimmer has an additional
          function used in conjunction with the Z switch.
        source: readme
      z:
        label: Mode / Next
        description: 'The Z switch does 4 things: 1. In the *middle* position, the
          module is in the Normal mode, with normal outputs on Audio Out 1 + 2 2.
          In the *up* position, the module is in the Alt mode, with alternative outputs
          on Audio Out 1 + 2 3. Pushing the momentary switch *down* and returning
          to the *middle* will move the engine to the next slot, and change the LED.
          Note: the change happens when you release the Z switch, not wh'
        source: readme
    inputs:
      audio_l:
        label: Audio
        description: 'Below the X and Y trimmers are CV modulation inputs. The inputs
          can accept values from -6 V to 6 V. If there is a cable connected, the X
          and Y trimmers become *attenuators* for the CV signal on the input cable.
          These inputs run at control rate, not at the full audio rate. > Tip: The
          Workshop System''s Slopes modules, when running in Loop mode with nothing
          connected to the input, will output 0 V to 12 V. This is not id'
        source: readme
      audio_r:
        label: Audio
        description: 'Below the X and Y trimmers are CV modulation inputs. The inputs
          can accept values from -6 V to 6 V. If there is a cable connected, the X
          and Y trimmers become *attenuators* for the CV signal on the input cable.
          These inputs run at control rate, not at the full audio rate. > Tip: The
          Workshop System''s Slopes modules, when running in Loop mode with nothing
          connected to the input, will output 0 V to 12 V. This is not id'
        source: readme
      cv_1:
        label: Pitch
        description: 'A 1 V per octave CV input connected to the main tuning. It works
          relative to the Main knob position but doesn''t exceed the 10Hz - 10KHz
          range limit. > Tip: It''s fun to connect the SineSquare Oscillators to this
          input. However, there is no attenuator for it, but you can pass the oscillator''s
          output through the Stompbox section and use the Blend knob to attenuate
          the signal. CV In 1 runs at control rate - approx 1kHz'
        source: readme
      cv_2:
        label: Gain
        description: 'CV In 2 acts like a standard VCA for both outputs. The input
          responds to signals in the 0-5 V range. Zero and below mutes both outputs.
          5 V and above (up to the 6 V limit) sets unity gain for the outputs. It''s
          also set to unity gain if nothing is plugged in. Note: the Ring Mod on the
          Workshop System can also be used as a VCA, but then you don''t get stereo
          and you no longer have a ring modulator. This frees it up for'
        source: readme
      pulse_1:
        label: Mode / Next
        description: When plugged in it overrides the Z up/middle position setting
          and switches the module between Normal mode with a low input (0 V) and Alt
          mode with a high input (5 V).
        source: readme
      pulse_2:
        label: Mode / Next
        description: 'When plugged in it overrides the Z momentary down/middle position
          setting and advances to the next engine on each new rising edge (0 to 5
          V). > Tip: Connecting the SineSquare Oscillators'' square outputs to these
          Pulse inputs is some rhythmic fun!'
        source: readme
    outputs:
      audio_out_l:
        label: |-
          Audio
          1
        description: 'Used in main.cpp: AudioOut1(int16_t(out1));'
        source: code
      audio_out_r:
        label: |-
          Audio
          2
        description: 'Used in main.cpp: AudioOut2(int16_t(out2));'
        source: code
      cv_out_1:
        label: Pitch
        description: This passes the MIDI note value out in 1 V per octave format.
          This is independent of the Main knob position or CV In 1 so it's a direct
          MIDI to CV mapping. Handy for sending MIDI sequences to other oscillators.
        source: readme
      cv_out_2:
        label: CV
        description: CV Out 2 is a secret weapon! It is connected internally to MIDI
          CC 74, so you can send MIDI Control Change messages from your DAW/MIDI sequencer
          and control anything that accepts a -6 V to 6 V input. MIDI CC is limited
          to 128 steps, so it might be a bit too jagged for precision requirements.
          When the module restarts or the MIDI CC 74 value is set to 0, it will output
          -6 V which can be very useful on the Workshop Syst
        source: readme
      pulse_out_1:
        label: Gate
        description: This follows the MIDI gate on/off, going high (5 V) while the
          note is held.
        source: readme
      pulse_out_2:
        label: Mode / Next
        description: This is the other secret weapon. Pulse Out 2 is a clock output
          that can drive sequencers, delays, or just make interesting rhythmic patterns.
          The speed of the clock can be adjusted by holding the Z switch down and
          turning the X trimmer. Once you've turned the X knob while holding Z down,
          the engine slot won't advance when you release Z. The clock rate goes from
          20 - 999 BPM. If there is a MIDI clock present at the US
        source: readme
  switch_modes:
    up: ''
    middle: ''
    down: ''
  leds:
  - This shows the currently selected engine and flashes briefly when receiving MIDI
    notes.
  notes:
  - Generated from README plus raw source usage scan. Labels marked by code only should
    be reviewed for musical wording.

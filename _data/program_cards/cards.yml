- id: 03_Turing_Machine
  title: Turing Machine
  release: 03 / v1.5
  summary: Turing Machine with tap tempo clock, pulse outputs and quantised CV outputs.
  description: Turing Machine with tap tempo clock, pulse outputs and quantised CV
    outputs.
  panel:
    controls:
      main:
        label: Mutation / Lock
        description: sets mutation / lock. Centre keeps changing; either end settles
          into a loop or its inverted partner.
        source: curated
      x:
        label: Length
        description: 'chooses loop length: 2, 3, 4, 5, 6, 8, 12 or 16 steps.'
        source: curated
      y:
        label: Diviply
        description: sets Channel 2 clock divide / multiply. CV In 1 moves the same
          control.
        source: curated
      z:
        label: Presets / Tap
        source: curated
    inputs:
      audio_l:
        label: Reset
        description: Reset all six Turing streams on a rising edge.
        source: curated
      audio_r:
        label: |-
          Preset
          CV
        description: 'CV override for preset switch: high = Up, low = Middle.'
        source: curated
      cv_1:
        label: Diviply
        description: Diviply CV, summed with Y.
        source: curated
      cv_2:
        label: |-
          Pitch
          Offset
        description: Pitch offset for both pitch outputs, roughly 0-1V quantised to
          semitones.
        source: curated
      pulse_1:
        label: |-
          Clock
          1
        description: External main clock; replaces tap tempo.
        source: curated
      pulse_2:
        label: |-
          Clock
          2
        description: Independent Channel 2 clock; overrides diviply.
        source: curated
    outputs:
      audio_out_l:
        label: |-
          Raw
          CV 1
        description: Channel 1 raw Turing voltage. Range comes from the active preset.
        source: curated
      audio_out_r:
        label: |-
          Raw
          CV 2
        description: Channel 2 raw Turing voltage. Range comes from the active preset.
        source: curated
      cv_out_1:
        label: |-
          Pitch
          1
        description: Channel 1 quantised 1V/oct pitch.
        source: curated
      cv_out_2:
        label: |-
          Pitch
          2
        description: Channel 2 quantised 1V/oct pitch, with the CV2 offset.
        source: curated
      pulse_out_1:
        label: |-
          Pulse
          1
        description: Main clock pulse, or Turing pulse if that mode is selected.
        source: curated
      pulse_out_2:
        label: |-
          Pulse
          2
        description: Diviply/Turing pulse, or a mirror of Pulse In 2 when externally
          clocked.
        source: curated
  switch_modes:
    up: Preset B.
    middle: Preset A.
    down: Tap tempo, when Pulse In 1 is empty.
  leds:
  - The top four LEDs show the current Turing values for the two raw CVs and two pitch
    CVs.
  - The bottom pair flash with Pulse Outs 1 and 2. When X changes loop length, the
    cluster briefly becomes a length-pattern display.
  notes:
  - Curated from README and bundled Rev_1_5 source.
  source:
  - 03_Turing_Machine/README.md
  - 03_Turing_Machine/Rev_1_5_Code
  slug: 03-turing-machine
  url: "/workshopsystem/program-cards/03-turing-machine/"

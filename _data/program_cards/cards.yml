- id: 06_usb_audio
  title: USB Audio & MIDI
  release: 06 / 1.0
  summary: 6-Channel USB Audio & MIDI firmware with CV/Gate support
  description: 6-Channel USB Audio & MIDI firmware with CV/Gate support
  panel:
    controls:
      main:
        label: CC 1
        description: CC 1 (Ch 1)
        source: readme
      x:
        label: CC 2
        description: CC 2 (Ch 1)
        source: readme
      y:
        label: |-
          CC 3
          Web Interface
        description: 'CC 3 (Ch 1) Web Interface: All settings (Sample Rate, Channel
          Count, CV/Pulse Modes) can be adjusted using the Workshop System Web Tools.
          The configuration can be saved to the device''s flash memory. > [!WARNING]
          > USB 1.1 Bandwidth & Stability > > This device operates as a Full Speed
          USB 1.1 device. Bandwidth is extremely limited, especially when combined
          with MIDI traffic. Performance varies significantly by Operating System
          and Host Controller. > > Tested Configurations (Testing Required): > - macOS:
          6 Channels @ 48 kHz . > - Windows: Limited bandwidth. Usually requires reducing
          to 6 Channels @ 24 kHz or 4 Channels @ 44.1 kHz. > - Linux: 2 channel audio
          works up to 48kHz. 4 channel audio works up to 24kHz > > *Please test different
          configurations/ Audio Drivers for stability on your specific system.*'
        source: readme
      z:
        label: |-
          6-Channel Audio
          I/O
        description: '6-Channel Audio I/O: Direct mapping of the 6 hardware channels
          to USB Audio channels 1-6.'
        source: readme
    inputs:
      audio_l:
        label: |-
          Stereo Passthrough
          on
        description: Stereo Passthrough on USB Channels 5/6.
        source: readme
      audio_r:
        label: |-
          Audio
          2
        description: 'Used in main.cpp: case 1: return AudioIn2() << 4;'
        source: code
      cv_1:
        label: Pitch
        description: 1V/Oct Pitch Interface (MIDI Note <-> CV).
        source: readme
      cv_2:
        label: |-
          CC Interface
          .
        description: CC Interface (MIDI CC <-> CV).
        source: readme
      pulse_1:
        label: Gate
        description: Gate Interface (Note On/Off <-> Pulse).
        source: readme
      pulse_2:
        label: Clock
        description: Clock/Run Interface.
        source: readme
    outputs:
      audio_out_l:
        label: |-
          Audio
          1
        description: 'Used in main.cpp: case 0: AudioOut1(val >> 4); break; // Audio
          1'
        source: code
      audio_out_r:
        label: |-
          Audio
          2
        description: 'Used in main.cpp: case 1: AudioOut2(val >> 4); break; // Audio
          2'
        source: code
      cv_out_1:
        label: |-
          CV
          1
        description: 'Used in main.cpp: case 2: CVOut1(val); break; // CV 1'
        source: code
      cv_out_2:
        label: |-
          CV
          2
        description: 'Used in main.cpp: case 3: CVOut2(val); break; // CV 2'
        source: code
  switch_modes:
    up: 'Audio L/R: Stereo Passthrough on USB Channels 5/6. CV 1: 1V/Oct Pitch Interface
      (MIDI Note <-> CV). CV 2: CC Interface (MIDI CC <-> CV). Pulse 1: Gate Interface

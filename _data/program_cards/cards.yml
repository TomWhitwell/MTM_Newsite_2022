- id: 05_chord_blimey
  title: Chord Blimey!
  release: 05 / 0.9
  summary: Generates CV/Pulse arpeggios
  description: Generates CV/Pulse arpeggios
  panel:
    controls:
      main:
        label: Speed
        description: Controls arpeggio speed (note length). Faster at higher settings.
        source: readme
      x:
        label: CV
        description: Controls root note in volts (0–1V) — combined with CV In 1.
        source: readme
      y:
        label: CV
        description: Selects chord type — combined with CV In 2.
        source: readme
      z:
        label: UP
        description: 'UP: Full-length mode (all chord notes). MID: Fixed-length mode
          (limits to selected number of steps). DOWN: Short press cycles fixed-length
          number (1–6 steps). Long press changes arpeggiator direction.'
        source: readme
    inputs:
      cv_1:
        label: |-
          Adds root
          note
        description: Adds to the root note (in volts). 1V = 1 octave.
        source: readme
      cv_2:
        label: |-
          Adds chord
          selection
        description: Adds to the chord selection (0–1V range).
        source: readme
      pulse_1:
        label: Trigger
        description: Starts the arpeggio when triggered. If patched from Pulse Out
          2, the arpeggio will loop.
        source: readme
    outputs:
      audio_out_l:
        label: |-
          Random voltage
          0–1V
        description: Random voltage 0–1V (changes at chord end).
        source: readme
      audio_out_r:
        label: |-
          Random voltage
          0–1V
        description: Random voltage 0–1V (changes at chord end).
        source: readme
      cv_out_1:
        label: |-
          Current note
          arpeggio
        description: Current note of the arpeggio (root + chord degree).
        source: readme
      cv_out_2:
        label: |-
          Root note
          chord
        description: Root note of the chord (constant for the duration of the chord).
        source: readme
      pulse_out_1:
        label: |-
          Fires each
          note
        description: Fires for each note in the arpeggio.
        source: readme
      pulse_out_2:
        label: |-
          Fires when
          last
        description: Fires when the last note of the arpeggio plays (also at startup).
        source: readme
  switch_modes:
    up: Ascend through notes. 0X XX XX
    middle: ''
    down: Descend through notes. XX XX 0X
  leds:
  - LEDs | Show current step in sequence during playback. Also flash a pattern when
    arpeggiator direction changes, or when fixed-length is adjusted. LEDs briefly
    show a pattern for the selected mode. Mode | Description | LED Pattern
  notes:

  title: Wild Pebble
  release: 74 / 0.9
  summary: Playable generative rhythm and melody organism inspired by Pet Rock.
  description: Evolving rhythmic structures, quantised melodies, drum voices and modulation
    voltages that slowly transform while staying musically connected.
  panel:
    controls:
      main:
        label: Clock
        description: Internal clock speed. Ignored when an external clock is patched.
        source: readme
      x:
        label: Density
        description: Rhythmic density. CV In 1 modulates the trigger probability.
        source: readme
      y:
        label: Mutation
        description: 'Mutation intensity: melodic movement, scale changes and structural
          instability. CV In 2 modulates the amount.'
        source: readme
    inputs:
      pulse_1:
        label: Clock
        description: External clock input. Overrides the internal clock while active.
        source: readme
      pulse_2:
        label: Freeze
        description: Holds the current structure and disables mutation while high.
        source: readme
      cv_1:
        label: Density CV
        description: Modulates rhythmic density.
        source: readme
      cv_2:
        label: Mutation CV
        description: Modulates mutation amount.
        source: readme
    outputs:
      pulse_out_1:
        label: Rhythm 1
        description: Primary rhythm stream, also driving melodic progression and kick
          voice.
        source: readme
      pulse_out_2:
        label: Rhythm 2
        description: Derived companion rhythm stream for snare/percussion and correlated
          variation.
        source: readme
      cv_out_1:
        label: Pitch
        description: Quantised melodic pitch output from evolving scale-constrained
          note sequences.
        source: readme
      cv_out_2:
        label: Energy
        description: Smoothed energy/tension modulation output.
        source: readme
      audio_out_l:
        label: Kick
        description: Kick drum voice from the primary trigger stream.
        source: readme
      audio_out_r:
        label: Snare
        description: Snare and percussion voice from the companion trigger stream.
        source: readme
  switch_modes:
    up: Stable melodic motion, restrained mutation and tighter rhythms.
    middle: Balanced mutation, moderate swing and gradual harmonic drift.
    down: Aggressive mutation, stronger swing, wider melodic jumps and denser companion
      rhythms.
  leds:
  - Six LEDs visualise rhythm, density, mutation, energy, clock source and tension.
  notes:
  - Generated from README plus raw source usage scan. Labels marked by code only should
    be reviewed for musical wording.

  description: Comparator and VC clock divider, inspired by Serge NCOM
  panel:
    controls:
      z:
        label: Pitch
        description: 'up for ascending steps, middle for descending steps. CV In 2
          inverts this direction. Note: This changes only the pitch, the counter itself
          always counts up.'
        source: readme
    inputs:
      audio_l:
        label: |-
          Audio
          1
        description: 'Used in divcom.cpp: sig = AudioIn1();'
        source: code
      audio_r:
        label: |-
          Audio
          2
        description: 'Used in divcom.cpp: ref += (((int32_t)AudioIn2() * scale) >>
          11);'
        source: code
      cv_1:
        label: 0V gives n
        description: 0V gives n = 1, 5V gives the selected value.
        source: readme
      cv_2:
        label: |-
          CV
          2
        description: CV1 outputs whole tone steps for the counter. direction (up/down)
          depends on the switch, CVIn2 inverts the direction
        source: code
    outputs:
      audio_out_l:
        label: |-
          Audio
          1
        description: 'Used in divcom.cpp: AudioOut1(compHigh ? 2047 : -2048);'
        source: code
      audio_out_r:
        label: |-
          Audio
          2
        description: 'Used in divcom.cpp: AudioOut2(dividerHigh ? 2047 : -2048);'
        source: code
      pulse_out_1:
        label: |-
          high one
          divider
        description: high for one divider cycle, low for the next.

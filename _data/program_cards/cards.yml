- id: 72_motorik
  title: Motorik
  release: 72 / 1.0
  summary: Motorik drum machine — kick/snare/hihat with bass and melody CV, classic
    Krautrock grooves
  description: Motorik drum machine — kick/snare/hihat with bass and melody CV, classic
    Krautrock grooves
  panel:
    controls:
      main:
        label: Audio
        description: 'Texture / wash when Audio In 2 is disconnected — resonant low-pass
          filter depth. Left = bright and dry, right = dark and washed out. When Audio
          In 2 is patched, the Main knob instead controls decimation (sample rate
          reduction): left = clean 48kHz, right = gritty crushed output down to ~200Hz.
          Filter control moves to Audio In 2.'
        source: readme
      x:
        label: |-
          Pattern variation
          —
        description: 'Pattern variation — 0 = locked (exact repeat), full = ~6% chance
          per step per voice to toggle bits each bar. Mutations are ephemeral: the
          base pattern is restored at the start of each bar, so the groove breathes
          without drifting.'
        source: readme
      y:
        label: Trigger
        description: at 0 no fills occur, at max a fill triggers roughly every other
          bar. Fills restore the original pattern after one bar.
        source: readme
    inputs:
      audio_l:
        label: Length
        description: Input Energy zone override (envelope follower). External audio
          or CV dynamically layers voices — quiet/thin input = kick only, loud/dense
          input = full pattern with double-time hihats. When nothing patched, the
          Main knob in Z=Middle controls energy.
        source: readme
      audio_r:
        label: Audio
        description: Input Texture filter override (envelope follower). External audio
          or CV drives the resonant low-pass wash — quiet/bright patches open up the
          mix, loud/dark signals drown it in dub texture. When nothing's patched,
          the Z=Up Main knob controls the filter.
        source: readme
      cv_1:
        label: CV
        description: Input Bass root transpose CV. Adds to the X knob root offset,
          ±12 semitones range. Sequence chord changes from an external step sequencer.
          Clamped to MIDI 24–60.
        source: readme
      cv_2:
        label: CV
        description: Input Bass pattern shift modulation. Adds to the X/Y knob shift
          values, ±4 steps range. Slow LFOs or random CV create woozy, off-grid bass
          timing.
        source: readme
      pulse_1:
        label: Clock
        description: Input External clock (rising edge). Disconnected → internal 120
          BPM clock.
        source: readme
      pulse_2:
        label: Trigger
        description: Input Fill trigger (rising edge). Each pulse triggers a one-bar
          fill. Works alongside probabilistic fills from the Y knob.
        source: readme
    outputs:
      audio_out_l:
        label: |-
          Drum mix
          spectral
        description: Output Drum mix with spectral tilt, optionally filtered when
          Z = Up
        source: readme
      audio_out_r:
        label: |-
          Same drum
          mix
        description: Output Same drum mix
        source: readme
      cv_out_1:
        label: Pitch
        description: Output Bass pitch CV (MIDI note scale, 0V during rests)
        source: readme
      cv_out_2:
        label: Pitch
        description: Output Bass mirror pitch CV (root + 12 semitones, 0V during rests)
        source: readme
      pulse_out_1:
        label: Gate
        description: Output Bass gate (high during notes, low during rests and retrigger
          dip)
        source: readme
      pulse_out_2:
        label: Gate
        description: Output Bass mirror gate (same pattern, one octave up)
        source: readme

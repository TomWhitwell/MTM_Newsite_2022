# Tag administration for generated card pages.
# Edit this file to add, rename, remove, or reassign flairs.
# `available_tags` defines the vocabulary; `assignments` maps card IDs to tag labels.

available_tags:
  - id: "new"
    label: "New"
    description: "Recently added or worth drawing attention to."
    color: "#f3c338"
    text_color: "#111111"

  - id: "recommended"
    label: "Recommended"
    description: "Good starting points or especially useful cards."
    color: "#f28c38"
    text_color: "#111111"

  - id: "classic"
    label: "Classic"
    description: "Established core cards or familiar references."
    color: "#e7dd64"
    text_color: "#111111"

  - id: "updated"
    label: "Updated"
    description: "Recently revised firmware or documentation."
    color: "#91c7b1"
    text_color: "#111111"

  - id: "tom"
    label: "Monkey"
    description: "Recommended by Tom Whitwell."
    color: "#c8b3e6"
    text_color: "#111111"

  - id: "wild"
    label: "Wild"
    description: "Unexpected crazy cards"
    color: "#0FFF50"
    text_color: "#111111"


